<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Bank Transaction Analyzer</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<header class="topbar">

<div class="logo">
<i data-lucide="landmark"></i>
<h1>Bank Transaction Analyzer</h1>
</div>

<div class="nav-icons">
<i data-lucide="bell"></i>
<i data-lucide="user"></i>
</div>

</header>


<div class="layout">

<aside class="sidebar">

<h3 class="menu-title">Menu</h3>

<ul>

<li onclick="showSection('dashboard')">
<i data-lucide="layout-dashboard"></i>
Dashboard
</li>

<li onclick="showSection('add')">
<i data-lucide="plus-circle"></i>
Add Transaction
</li>

<li onclick="showSection('transactions')">
<i data-lucide="list"></i>
Transactions
</li>

<li onclick="showSection('summary')">
<i data-lucide="bar-chart-3"></i>
Monthly Summary
</li>

</ul>

</aside>


<main class="content">

<section id="dashboard" class="section fade">

<h2 class="section-title">Dashboard Overview</h2>

<div class="cards">

<div class="card debit">

<div class="card-header">
<i data-lucide="arrow-down-circle"></i>
</div>

<h3>Total Debit</h3>

<p id="totalDebit">0</p>

</div>


<div class="card credit">

<div class="card-header">
<i data-lucide="arrow-up-circle"></i>
</div>

<h3>Total Credit</h3>

<p id="totalCredit">0</p>

</div>


<div class="card balance">

<div class="card-header">
<i data-lucide="wallet"></i>
</div>

<h3>Balance</h3>

<p id="balance">0</p>

</div>

</div>

</section>



<section id="add" class="section hidden fade">

<h2 class="section-title">Add Transaction</h2>

<div class="form-card">

<input id="desc" placeholder="Transaction Description">

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="DEBIT">Debit</option>
<option value="CREDIT">Credit</option>
</select>

<input id="date" type="date">

<button onclick="addTransaction()">Add Transaction</button>

</div>

</section>



<section id="transactions" class="section hidden fade">

<h2 class="section-title">Transaction History</h2>

<table>

<thead>

<tr>
<th>Description</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>
</tr>

</thead>

<tbody id="transactionTable"></tbody>

</table>

</section>



<section id="summary" class="section hidden fade">

<h2 class="section-title">Monthly Summary</h2>

<div class="summary-controls">

<input id="year" placeholder="Year">

<input id="month" placeholder="Month">

<button onclick="getSummary()">Load Summary</button>

</div>


<div class="cards">

<div class="card debit">

<h3>Total Debit</h3>
<p id="summaryDebit">0</p>

</div>

<div class="card credit">

<h3>Total Credit</h3>
<p id="summaryCredit">0</p>

</div>

</div>

</section>

</main>

</div>

<script src="script.js"></script>

<script>
lucide.createIcons()
</script>

</body>

</html>
